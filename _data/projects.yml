# Combat Cognition App
- title: "Combat Cognition"
  description: "A progressive BJJ training application that accelerates skill acquisition through spaced repetition (SM-2 algorithm) and evidence-based mental visualization techniques. Combines physical training logs, guided 5-minute visualization sessions, smart scheduling, research protocols (nutrition, cardio, strength), and comprehensive progress tracking."
  technologies:
    - React
    - TypeScript
    - Vite
    - TailwindCSS
    - shadcn/ui
    - React Native
    - Expo
    - Express.js
    - PostgreSQL
    - Drizzle ORM
    - Supabase
  github_url: "https://github.com/LordOfTheTrees/combat-cognition"
  live_url: "https://combat-cognition-api.onrender.com/"
  documentation: ""
  key_features:
    - Physical training logs for grappling, striking, conditioning, and strength with technique tagging
    - SM-2 spaced repetition for visualization scheduling and review optimization
    - Guided five-minute visualization sessions with clarity ratings and automatic rescheduling
    - Weekly focus rotation that deterministically cycles through 20+ BJJ techniques
    - Evidence-based research protocols covering nutrition, cardio, strength periodization, and skill acquisition
    - Training analytics with multi-week trends, GitHub-style activity calendars, and streak tracking
    - Cross-platform web and mobile clients with feature parity (React + Vite, React Native + Expo)

