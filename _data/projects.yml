  live_url: ""
  documentation: ""
  in_progress: true
  key_features:
    - Tiered CSV ingest: UFCStats stats, optional promotions, Sherdog, chronological fights
    - Cross-promotion ELO construction with configurable era cutoffs for regression training
    - Cold-start and pedigree priors in the rating stack for sparse fighter histories
    - Six-class multinomial head with win, finish, and decision aggregate helpers
