# Enron email graph anomaly detection
- title: "Enron Email Graph: GNN-Based Anomaly Detection"
  description: "A research-oriented pipeline that models the Enron corpus as a communication graph and aims to surface behaviorally unusual actors from structure and metadata alone (headers, timing, threading, CC patterns)—not email body content. The design uses person-level nodes, a directed multigraph, rolling temporal windows with per-person baselines, and self-supervised graph autoencoders with optional temporal drift; evaluation is planned around held-out indicted executives and event-aligned sanity checks. The repo currently ships an installable Python package scaffold, documented architecture decisions, corpus extraction from the public maildir tarball, a root-level runner with per-stage rebuild vs cache flags, tests, and a plain-language roadmap for parsing, graph build, features, training, and eval."
  technologies:
    - Python
    - NetworkX
    - NumPy
    - Pandas
    - Scikit-learn
    - PyTorch Geometric
    - PyGOD
  github_url: "https://github.com/LordOfTheTrees/EnronEmails"
  live_url: ""
  documentation: ""
  in_progress: true
  key_features:
    - Installable Python package with tests, architecture notes, plain-language roadmap
    - Maildir tarball ingest toward person-level multigraph (headers and metadata only)
    - Graph builders: entity resolution, parallel edges, timing, threads, CC, reciprocity
    - Rolling 90-day snapshots, weekly step, per-actor baselines, sparse-window masking
    - Layered features: topology, temporal, behavioral; no org or HR tables
    - PyTorch Geometric–style GAE or VGAE hooks, optional temporal encoder
    - Root CLI with per-stage cache or rebuild for extract through train

