# MMA Pre-Fight Handicapping Model
- title: "MMA Pre-Fight Prediction: ELO + Multinomial Handicapping"
  description: "An interpretable pre-fight MMA handicapping pipeline that estimates a calibrated six-outcome probability distribution (win/lose by finish or decision) from tiered fight and fighter data. Combines cross-promotion ELO construction, ELO-weighted style features, matchup interactions, multinomial logistic regression, and explicit confidence intervals—using only information available before the opening bell."
  technologies:
