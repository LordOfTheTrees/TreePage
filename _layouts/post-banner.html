---
layout: default
---
<article class="post">
  <figure class="post-banner">
    <img src="{{ page.banner_image | relative_url }}" alt="{{ page.banner_alt | default: page.title | escape }}" loading="eager" decoding="async" />
  </figure>
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <p class="post-meta">{{ page.date | date: "%B %-d, %Y" }}</p>
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>
